name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcode-select -p
          swiftc --version

      - name: Build .app
        run: bash scripts/build-app.sh

      - name: Verify bundle
        run: |
          test -d "WAM Voice Capture.app"
          test -x "WAM Voice Capture.app/Contents/MacOS/WAMVoiceCapture"
          test -f "WAM Voice Capture.app/Contents/Info.plist"
          # Sanity-check Info.plist has the new identifier and 14.0+ deployment.
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier"   "WAM Voice Capture.app/Contents/Info.plist" | grep -q '^com\.artempolansky\.wam-voice-capture$'
          /usr/libexec/PlistBuddy -c "Print :LSMinimumSystemVersion" "WAM Voice Capture.app/Contents/Info.plist" | grep -q '^14\.'
          echo "Bundle contents:"
          ls -la "WAM Voice Capture.app/Contents/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WAM-Voice-Capture-app
          path: "WAM Voice Capture.app"
          retention-days: 14
